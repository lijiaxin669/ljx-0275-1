services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./dist:/usr/share/nginx/html:ro
      - pano-data:/usr/share/nginx/html/pano:ro
    depends_on:
      - node-service
    restart: unless-stopped

  node-service:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    volumes:
      - pano-data:/app/public/pano
    environment:
      - NODE_ENV=production
      - PORT=3001
    restart: unless-stopped

volumes:
  pano-data:
